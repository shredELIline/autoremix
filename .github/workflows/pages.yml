name: Pages

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/scripts/validate_docs.py
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Validate and package
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pages: read
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate static site
        run: python3 .github/scripts/validate_docs.py docs

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
